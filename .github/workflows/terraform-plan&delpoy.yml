name: Terraform Plan and Deploy

on:
  workflow_run:
    workflows: ["Docker Build and Push"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to latest)"
        required: false
        default: "latest"

env:
  AWS_REGION: eu-north-1
  TF_DIR: app/Infra
  ECR_REPOSITORY: threatmod

jobs:
  terraform_deploy:
    name: Terraform Plan and Apply
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve image URL
        id: image_meta
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          else
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          fi

          IMAGE_URL="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "image_url=${IMAGE_URL}" >> "$GITHUB_OUTPUT"
          echo "Using image: ${IMAGE_URL}"

      - name: Terraform fmt check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var="domain_name=${{ secrets.DOMAIN_NAME }}" \
            -var="hosted_zone_name=${{ secrets.HOSTED_ZONE_NAME }}" \
            -var="image_url=${{ steps.image_meta.outputs.image_url }}" \
            -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

  post_deploy_healthcheck:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: terraform_deploy
    steps:
      - name: Check /health endpoint
        run: |
          for i in $(seq 1 20); do
            if curl --silent --show-error --fail "https://${{ secrets.DOMAIN_NAME }}/health" >/dev/null; then
              echo "Health check passed."
              exit 0
            fi
            echo "Health check attempt $i failed, retrying..."
            sleep 15
          done
          echo "Health check failed after retries."
          exit 1
